<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#050d1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BookMyClinic">
  <meta name="description" content="Book clinic appointments instantly. Find doctors near you.">
  <title>BookMyClinic</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      background: #050d1a;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      font-family: sans-serif;
      color: #fff;
    }
    .logo {
      font-size: 32px;
      font-weight: 900;
      letter-spacing: -1px;
      margin-bottom: 10px;
    }
    .logo em {
      font-style: normal;
      color: #38bdf8;
    }
    .tagline {
      font-size: 14px;
      color: rgba(255,255,255,0.4);
      margin-bottom: 32px;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #38bdf8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="logo">Book<em>My</em>Clinic</div>
  <div class="tagline">Find doctors, book appointments, skip the queue</div>
  <div class="spinner"></div>

  <script>
    // Register service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }

    // Redirect to GAS app
    var GAS_URL = 'https://script.google.com/macros/s/AKfycbxc0773DM514dv_NyBOwdWWqPNzbqHkMIKIz3Ak6i3_-zhs3akbfQB29OGRqF7qBmqRQg/exec';
    setTimeout(function() {
      window.location.href = GAS_URL;
    }, 800);
  </script>
</body>
</html>
